# Render Blueprint – opprettar webtenesta automatisk.
# Dashboard → New → Blueprint → vel dette repoet.
#
# MERK om database: Render tillèt berre éin gratis PostgreSQL per konto/arbeidsområde.
# Denne kontoen har alt ei gratis database i bruk (anna prosjekt), så tenesta startar
# utan DATABASE_URL og brukar SQLite på flyktig disk (data nullstillast ved omstart).
# For varig lagring: opprett/frigjer ein PostgreSQL i Render og legg til miljøvariabelen
#   DATABASE_URL = Internal Database URL
# på tenesta – appen byter automatisk til PostgreSQL ved neste omstart.
services:
  - type: web
    name: nordfjordtrafikk
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: PUBLIC_URL
        value: https://nordfjordtrafikk.onrender.com
